    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.05); } }
        @keyframes liquid { 0% { transform: translateX(-50%) rotate(0deg); } 100% { transform: translateX(-50%) rotate(360deg); } }
        @keyframes bounce-slow { 0%, 100% { transform: translateY(-3%); } 50% { transform: translateY(3%); } }
        
        @keyframes sound-wave {
            0% { height: 10px; transform: scaleY(1); }
            50% { height: 30px; transform: scaleY(1.5); }
            100% { height: 10px; transform: scaleY(1); }
        }
        
        @keyframes rotate-3d {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        @keyframes scan-line {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }

        .animate-in { animation: fadeIn 0.3s ease-out forwards; }
        .animate-slide-up { animation: slideUp 0.4s ease-out forwards; }
        .animate-slide-right { animation: slideInRight 0.3s ease-out forwards; }
        .animate-pulse { animation: pulse 2s infinite; }
        .animate-bounce-slow { animation: bounce-slow 3s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite; }

        .liquid-wave {
            position: absolute;
            left: 50%;
            width: 200%;
            height: 200%;
            background: rgba(59, 130, 246, 0.4);
            border-radius: 40%;
            animation: liquid 8s linear infinite;
        }
        .liquid-wave:nth-child(2) {
            bottom: 10px;
            background: rgba(59, 130, 246, 0.6);
            animation: liquid 12s linear infinite;
        }
    </style>
</head>

                        </div>

                    </div>

                        <div className="flex justify-between text-slate-500"><span>交易时间</span><span className="text-slate-800">{data.time}</span></div>

            const [step, setStep] = useState('camera'); // 状态: camera(取景), analyzing(分析中), result(结果)
            const [preview, setPreview] = useState(null);

            // 1. 处理图片选择
            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setPreview(reader.result);
                        startAiAnalysis(); // 图片加载后自动开始 AI 分析
                    };
                    reader.readAsDataURL(file);
                }
            };

            // 2. 模拟 AI 分析过程

                setStep('analyzing');
                // 模拟 2秒 的计算时间

                    // 随机生成一个评估结果
                    const mockResults = [
                        { level: '中风险', color: 'text-orange-500', bg: 'bg-orange-50', type: '橡胶软管老化', advice: '建议更换为不锈钢波纹管', icon: <AlertTriangle size={32}/> },
                        { level: '高风险', color: 'text-red-500', bg: 'bg-red-50', type: '燃气泄漏报警', advice: '立即关闭阀门并开窗通风', icon: <Siren size={32}/> },
                        { level: '低风险', color: 'text-blue-500', bg: 'bg-blue-50', type: '灶具周围堆物', advice: '建议清理易燃杂物', icon: <CheckCircle2 size={32}/> }

                                                </div>
                                            </div>

                                        <div className="absolute bottom-4 left-4 w-8 h-8 border-b-4 border-l-4 border-white/50 rounded-bl-lg"></div>
                                        <div className="absolute bottom-4 right-4 w-8 h-8 border-b-4 border-r-4 border-white/50 rounded-br-lg"></div>
                                        <div className="text-white/50 text-xs mt-32">请将隐患部位对准框内</div>
                                    </>
                                )}

                                    <div className="absolute bottom-6 w-full flex justify-center items-center z-30">

                                        </div>
                                    </div>

                                </div>

                            {[1,2,3,4,5].map(i => (

                    </div>
                </Modal>
            );
        };
      // ==================== 替换开始 ====================
        const AddressModal = ({ onClose, showToast }) => {
            // 从本地存储加载地址，如果没有则使用默认数据
            const loadAddresses = () => {
                const saved = localStorage.getItem('user_addresses');
                return saved ? JSON.parse(saved) : [
                    { id: 1, name: "李建国", phone: "138****8888", address: "云南省昆明市呈贡区李家村3组8号", isDefault: true }
                ];
            };

            const [addresses, setAddresses] = useState(loadAddresses);
            const [view, setView] = useState('list'); // 'list' | 'add'
            const [newAddr, setNewAddr] = useState({ name: '', phone: '', address: '' });

            // 每次地址变动自动保存到本地
            useEffect(() => {
                localStorage.setItem('user_addresses', JSON.stringify(addresses));
            }, [addresses]);

            // 设为默认地址
            const handleSetDefault = (id) => {
                const updated = addresses.map(addr => ({ ...addr, isDefault: addr.id === id }));
                setAddresses(updated);
                showToast && showToast("已设为默认地址", "success");
            };

            // 删除地址
            const handleDelete = (e, id) => {
                e.stopPropagation();
                if (addresses.length <= 1) {
                    showToast && showToast("请至少保留一个地址", "error");
                    return;
                }
                const updated = addresses.filter(addr => addr.id !== id);
                // 如果删除的是默认地址，把第一个设为默认
                if (addresses.find(a => a.id === id).isDefault) {
                    updated[0].isDefault = true;
                }
                setAddresses(updated);
                showToast && showToast("地址已删除", "success");
            };

            // 保存新地址
            const handleSave = () => {
                if (!newAddr.name || !newAddr.phone || !newAddr.address) {
                    showToast && showToast("请填写完整信息", "error");
                    return;
                }
                const newItem = {
                    id: Date.now(),
                    name: newAddr.name,
                    phone: newAddr.phone,
                    address: newAddr.address,
                    isDefault: false
                };

                            </div>

        };

        // NEW: Chat Modal

                        <button onClick={()=>setActiveModal('points')} className="bg-white/10 hover:bg-white/20 backdrop-blur px-4 py-2 rounded-full text-xs font-bold transition-all active:scale-95 flex items-center gap-1">兑换好礼 <ChevronRight size={12}/></button>

        // 3. 主程序入口 (包含 D00 待付款订单数据)
        function GasDeliveryApp() {
            const [currentScreen, setCurrentScreen] = useState('login');
            const [showSplash, setShowSplash] = useState(true);
            const [isElderly, setIsElderly] = useState(false);
            const [toast, setToast] = useState(null);
            const [activeModal, setActiveModal] = useState(null);
            const [userTab, setUserTab] = useState('home');
            const [callInfo, setCallInfo] = useState(null);
            
            // 数据定义
            const [points, setPoints] = useState(2450);
            const [monthlySpending, setMonthlySpending] = useState(504.00);
            const [chartData] = useState([{val:30,shortLabel:"1"},{val:50,shortLabel:"5"},{val:40,shortLabel:"10"},{val:70,shortLabel:"15"},{val:50,shortLabel:"20"},{val:80,shortLabel:"25"},{val:60,shortLabel:"30"}]);
            const [transactions] = useState([{id: 1, product: "烤烟燃料包", time: "05-20 14:30", price: "280.00"}, {id: 2, product: "炒茶专用包", time: "05-15 11:20", price: "165.00"}]);
            
            // 订单数据：包含一个待付款订单
            const [orders, setOrders] = useState([
                {id:"D00", product:"大饭店专供", price:"260.00", status:"待付款", time: "2024-05-22 08:30"}, 
                {id:"D01", product:"烤烟燃料包", price:"280.00", status:"配送中", time: "2024-05-20 10:00"}, 
                {id:"D02", product:"炒茶专用包", price:"165.00", status:"已完成", time: "2024-05-15 14:20"},
                {id:"D03", product:"家庭标准装", price:"120.00", status:"接单", time: "2024-05-21 09:30"}
            ]);
            
            const [friendRequests, setFriendRequests] = useState({});

            const showToast = (message, type) => setToast({ message, type });
            const navigate = (screen) => setCurrentScreen(screen);
            const earnPoints = (amount) => { setPoints(p => p + amount); showToast(`积分 +${amount}`, "success"); };
            const spendPoints = (amount) => { if (points >= amount) { setPoints(p => p - amount); showToast(`积分 -${amount}`, "success"); } else { showToast("积分不足", "error"); } };
            
            const createNewOrder = (product, price) => { setOrders([{id: `D${Date.now()}`, product, price: price.toFixed(2), status: "接单", time: new Date().toLocaleTimeString()}, ...orders]); setActiveModal({type: 'payment-success'}); };
            const handleCall = (name, phone) => { setCallInfo({ name, phone }); };

            if (showSplash) return <SplashScreen onFinish={() => setShowSplash(false)} />;
            
            if (isElderly && currentScreen.startsWith('user-')) {
                return (
                    <>
                    <ElderlyHome onExit={()=>{setIsElderly(false);}} onCall={()=>{showToast("已为您呼叫最近的送气工", "success")}} onEmergency={()=>{showToast("已拨打 119 火警", "error")}} />
                    {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
                    </>
                );
            }

            return (
              <div className="h-full w-full relative">
                {callInfo && <CallOverlay name={callInfo.name} phone={callInfo.phone} onHangup={() => setCallInfo(null)} />}
                {currentScreen === 'login' && <LoginScreen navigate={navigate} showToast={showToast} toggleElderly={setIsElderly} />}
                
                {/* 页面路由 */}
                {currentScreen === 'ent-home' && <EnterpriseHome navigate={navigate} setActiveModal={setActiveModal} showToast={showToast} />}
                {currentScreen === 'ent-tracking' && <TrackingScreen navigate={navigate} />}
                {currentScreen === 'ent-crm' && <CRMScreen navigate={navigate} showToast={showToast} />}
                {currentScreen === 'ent-rank' && <RankScreen navigate={navigate} showToast={showToast} />}
                {currentScreen === 'ent-emergency' && <EmergencyScreen navigate={navigate} showToast={showToast} />}
                {currentScreen === 'ent-waybill' && <WaybillScreen navigate={navigate} showToast={showToast} />}
                {currentScreen === 'ent-asset' && <AssetTraceScreen navigate={navigate} showToast={showToast} />}
                {currentScreen === 'ent-maintenance' && <MaintenanceScreen navigate={navigate} showToast={showToast} />}

                {currentScreen === 'user-tracking' && <UserTrackingScreen navigate={navigate} showToast={showToast} onCall={handleCall} />}
                {currentScreen === 'user-home' && (
                    <UserContainer 
                        userTab={userTab} setUserTab={setUserTab} setActiveModal={setActiveModal} showToast={showToast} navigate={navigate} orders={orders} createNewOrder={createNewOrder} toggleElderly={() => setIsElderly(true)} transactions={transactions} monthlySpending={monthlySpending} chartData={chartData} friendRequests={friendRequests} setFriendRequests={setFriendRequests} earnPoints={earnPoints} points={points}
                    />
                )}
                
                {/* 全局弹窗 */}
                {activeModal === 'monitoring' && <Modal title="数字孪生监控" color="red" onClose={() => setActiveModal(null)}><div className="space-y-4"><div className="bg-slate-900 p-3 rounded-lg border border-slate-800 text-cyan-400 font-bold text-xs flex items-center justify-between"><span className="flex items-center gap-2"><Activity size={14} className="animate-pulse"/> 实时数据流</span><span className="text-slate-500">更新于 2s 前</span></div><ThreeDTank level={45} pressure={2.4} /><div className="grid grid-cols-2 gap-2"><button className="bg-red-500 text-white py-3 rounded-lg font-bold shadow-[0_4px_10px_rgba(239,68,68,0.4)] active:scale-95 transition-transform" onClick={()=>showToast("已关阀")}>紧急关阀</button><button className="bg-slate-100 text-slate-700 py-3 rounded-lg font-bold active:scale-95 transition-transform" onClick={()=>{showToast("正在联络指挥中心...", "success"); }}>联络中心</button></div></div></Modal>}

                            if (activeModal.orderId) {
                                setOrders(prev => prev.map(o => o.id === activeModal.orderId ? {...o, status: '配送中'} : o));
                                setActiveModal({type: 'payment-success'});
                            } else {
                                createNewOrder(activeModal.product, Number(activeModal.price));
                            }
                        }} 
                    />
                )}

                {/* 订单列表弹窗 */}
                {activeModal === 'user-orders' && <Modal title="我的订单" onClose={()=>setActiveModal(null)}><div className="space-y-3">{orders.map((o,i)=>(<div key={i} className="bg-slate-50 p-4 rounded-xl border border-slate-100 space-y-2"><div className="flex justify-between"><span className="font-bold">{o.product}</span><span className={`text-xs px-2 py-1 rounded border ${o.status==='配送中'?'bg-blue-100 text-blue-600 border-blue-200': o.status==='接单'?'bg-yellow-100 text-yellow-700 border-yellow-200':o.status==='待付款'?'bg-red-100 text-red-600 border-red-200':'bg-white text-slate-500'}`}>{o.status}</span></div><div className="flex justify-between items-center"><span className="font-bold text-orange-500">¥{o.price}</span>{o.status === '待付款' && (<button onClick={() => { setActiveModal({type: 'payment', product: o.product, price: Number(o.price), orderId: o.id}); }} className="px-3 py-1.5 bg-red-600 text-white text-xs rounded-lg font-bold flex items-center gap-1 active:scale-95 transition-transform">去支付</button>)}{o.status === '配送中' && (<button onClick={() => { setActiveModal(null); navigate('user-tracking'); }} className="px-3 py-1.5 bg-slate-900 text-white text-xs rounded-lg font-bold flex items-center gap-1 active:scale-95 transition-transform"><Truck size={12}/> 查看物流</button>)}{o.status === '已完成' && (<button onClick={() => setActiveModal('review')} className="px-3 py-1.5 bg-white border border-slate-300 text-slate-600 text-xs rounded-lg font-bold flex items-center gap-1 active:scale-95 transition-transform">评价</button>)}{o.status === '接单' && (<button onClick={() => showToast("已催单，师傅正火速赶来", "success")} className="px-3 py-1.5 bg-orange-100 text-orange-600 text-xs rounded-lg font-bold flex items-center gap-1 active:scale-95 transition-transform">催单</button>)}</div></div>))}</div></Modal>}

                {activeModal === 'bottle-trace' && <BottleTraceModal onClose={()=>setActiveModal(null)} />}
                {activeModal && activeModal.type === 'payment-success' && <PaymentSuccessModal onClose={()=>setActiveModal(null)} onViewOrder={()=>setActiveModal('user-orders')} />}
                {activeModal === 'points' && <PointsMallModal onClose={()=>setActiveModal(null)} showToast={showToast} points={points} spendPoints={spendPoints} />}
                {activeModal === 'snap' && <SnapModal onClose={()=>setActiveModal(null)} showToast={showToast} />}
                {activeModal === 'feedback' && <FeedbackModal onClose={()=>setActiveModal(null)} showToast={showToast} />}
                {activeModal === 'energy-report' && <EnergyReportModal onClose={()=>setActiveModal(null)} />}
                {activeModal === 'user-invoice' && <InvoiceModal onClose={()=>setActiveModal(null)} showToast={showToast} />}
                {activeModal === 'user-address' && <AddressModal onClose={()=>setActiveModal(null)} showToast={showToast} />}
                {activeModal === 'review' && <ReviewModal onClose={()=>setActiveModal(null)} showToast={showToast} />}
                {activeModal && activeModal.type === 'receipt' && <ReceiptModal data={activeModal.data} onClose={()=>setActiveModal(null)} showToast={showToast} />}
                {activeModal && activeModal.type === 'chat' && <ChatModal title={activeModal.title} onClose={()=>setActiveModal(null)} />}
                {activeModal && activeModal.type === 'friend' && <Modal title="好友互动" onClose={()=>setActiveModal(null)}><div className="flex flex-col items-center py-6 space-y-4"><div className="w-20 h-20 rounded-full bg-slate-200 overflow-hidden border-2 border-white shadow-md"><img src={`https://api.dicebear.com/7.x/avataaars/svg?seed=${activeModal.name}`} alt="avatar" /></div><h3 className="text-xl font-bold">{activeModal.name}</h3><div className="flex gap-4 w-full px-4"><button onClick={()=>{showToast("已发送提醒", "success"); setActiveModal(null);}} className="flex-1 py-3 bg-orange-100 text-orange-600 rounded-xl font-bold text-sm">提醒检查安全</button><button onClick={()=>{showToast("已赠送积分", "success"); setActiveModal(null);}} className="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold text-sm">赠送 10 积分</button></div></div></Modal>}
                {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<GasDeliveryApp />);
    </script>
</body>
</html>
