<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>芯有灵犀｜企业路演视觉作品</title>
  <link rel="stylesheet" href="ppt-viewer.css">
</head>
<body>
  <div class="ppt-page">
    <header class="ppt-header">
      <a class="back-link" href="index.html?return=more#more">← 返回作品集</a>
      <span class="ppt-header-note">部分项目已脱敏，仅展示节选页面</span>
    </header>
    <main class="ppt-main ppt-main-compact">
      <section class="ppt-detail-layout">
        <aside class="ppt-info-panel">
          <p class="eyebrow">企业路演视觉作品</p>
          <h1 data-project-title></h1>
          <p class="ppt-company" data-project-company></p>
          <p class="ppt-description" data-project-description></p>
          <div class="ppt-tags" data-project-tags></div>
          <div class="ppt-role">
            <span>我负责</span>
            <p data-project-role></p>
          </div>
          <div class="ppt-actions">
            <a class="btn btn-secondary" href="index.html?return=more#more">返回作品集</a>
            <a class="btn btn-primary" href="index.html#contact">联系我查看完整材料</a>
          </div>
        </aside>
        <section class="viewer-shell" aria-label="PPT 节选浏览器">
          <div class="viewer-stage">
            <button class="viewer-arrow prev" type="button" data-prev aria-label="上一页">←</button>
            <div class="slide-frame"></div>
            <button class="viewer-arrow next" type="button" data-next aria-label="下一页">→</button>
          </div>
          <div class="viewer-meta">
            <strong class="slide-count"></strong>
            <p class="slide-caption"></p>
          </div>
          <div class="thumb-strip" aria-label="缩略图导航"></div>
        </section>
      </section>
    </main>
    <footer class="ppt-footer">部分企业项目内容已做脱敏处理，仅展示封面与部分视觉页面。</footer>
  </div>
  <script>
    window.pptProject = {
      title: "芯有灵犀",
      company: "金华高格软件有限公司",
      description: "基于自研芯片和 AI 算法的中小企业仓储智能解决方案。",
      tags: ["智能仓储", "AI算法", "企业路演"],
      role: "方案内容梳理 / PPT视觉优化 / 路演表达整理",
      slides: [
        { image: "assets/ppt-xinyoulingxi-01.webp", caption: "解决方案定位与核心组成" },
        { image: "assets/ppt-xinyoulingxi-02.webp", caption: "中小企业仓储管理痛点" },
        { image: "assets/ppt-xinyoulingxi-03.webp", caption: "服务范围与商业化路径" }
      ]
    };
  </script>
  <script src="ppt-viewer.js"></script>
</body>
</html>
